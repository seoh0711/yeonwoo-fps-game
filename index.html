<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #blocker {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    #instructions {
      color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif;
    }

    #instructions h1 { font-size: 48px; margin-bottom: 20px; }
    #instructions p { font-size: 18px; line-height: 1.8; color: #ccc; }
    #instructions .key {
      display: inline-block; background: #333; padding: 4px 12px;
      border-radius: 4px; font-family: monospace; color: #fff;
      border: 1px solid #555;
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
    }
    #crosshair::before { width: 20px; height: 2px; top: -1px; left: -10px; }
    #crosshair::after { width: 2px; height: 20px; left: -1px; top: -10px; }

    #hud {
      position: fixed; bottom: 20px; left: 20px;
      color: #fff; font-family: 'Segoe UI', sans-serif;
      font-size: 16px; z-index: 5; pointer-events: none;
    }
    #hud .hp-bar {
      width: 200px; height: 8px; background: #333;
      border-radius: 4px; margin-top: 6px;
    }
    #hud .hp-bar-fill {
      height: 100%; background: #4f4; border-radius: 4px;
      transition: width 0.3s;
    }

    #score {
      position: fixed; top: 20px; right: 20px;
      color: #fff; font-family: 'Segoe UI', sans-serif;
      font-size: 24px; z-index: 5; pointer-events: none;
    }

    #hit-marker {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 6; pointer-events: none; opacity: 0;
      transition: opacity 0.1s;
      color: #ff0; font-size: 24px; font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="blocker">
    <div id="instructions">
      <h1>FPS GAME</h1>
      <p>
        <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> 이동<br>
        <span class="key">마우스</span> 조준 &nbsp; <span class="key">클릭</span> 발사<br>
        <span class="key">Space</span> 점프 &nbsp; <span class="key">R</span> 재장전<br><br>
        클릭하여 시작
      </p>
    </div>
  </div>

  <div id="crosshair"></div>

  <div id="hud">
    <div>HP: <span id="hp-text">100</span></div>
    <div class="hp-bar"><div class="hp-bar-fill" id="hp-bar-fill"></div></div>
    <div style="margin-top: 8px;">탄약: <span id="ammo">30</span> / 30</div>
  </div>

  <div id="score">SCORE: <span id="score-value">0</span></div>
  <div id="hit-marker">X</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
